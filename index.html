<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skin Directory</title>

<style>
body {
    background: #121212;
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
}

#skins {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
}

.skin {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #1e1e1e;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #333;
}

.skin img {
    width: 64px;
    height: 64px;
    image-rendering: pixelated;
    border-radius: 4px;
    background: #2a2a2a;
}

.skin-name {
    color: #6cb6ff;
    cursor: pointer;
    font-weight: bold;
    font-size: 1.1em;
}

.skin-name:hover {
    text-decoration: underline;
}

#toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #22c55e;
    color: white;
    padding: 12px 18px;
    border-radius: 8px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
}

.loading {
    text-align: center;
    color: #aaa;
}
</style>
</head>
<body>

<h1>Skin Directory</h1>

<p style="text-align:center;">
Click a skin name to copy the command.
</p>

<div id="skins">
    <div class="loading">Loading skins...</div>
</div>

<div id="toast">Copied!</div>

<script>
const USER = "FloppyDisk-OSC";
const REPO = "skins";

async function loadSkins() {
    try {
        const response = await fetch(
            `https://api.github.com/repos/${USER}/${REPO}/contents`
        );

        const files = await response.json();

        const skins = files
            .filter(file => file.name.toLowerCase().endsWith(".png"))
            .sort((a, b) => a.name.localeCompare(b.name));

        const container = document.getElementById("skins");
        container.innerHTML = "";

        skins.forEach(file => {
            const skinName = file.name.replace(/\.png$/i, "");

            const card = document.createElement("div");
            card.className = "skin";

            card.innerHTML = `
                <img src="${file.download_url}" alt="${skinName}">
                <span class="skin-name">${skinName}</span>
            `;

            card.querySelector(".skin-name").addEventListener("click", async () => {
                const command =
`/skin set web slim "https://floppydisk-osc.github.io/skins/${file.name}"`;

                await navigator.clipboard.writeText(command);

                const toast = document.getElementById("toast");
                toast.style.opacity = "1";

                setTimeout(() => {
                    toast.style.opacity = "0";
                }, 1500);
            });

            container.appendChild(card);
        });
    } catch (error) {
        document.getElementById("skins").innerHTML =
            "<p>Failed to load skins.</p>";
        console.error(error);
    }
}

loadSkins();
</script>

</body>
</html>
