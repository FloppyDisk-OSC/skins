<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FloppyDisk-OSC Skin Browser</title>

<style>
body{
    background:#121212;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

#skins{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(420px,1fr));
    gap:12px;
}

.skin{
    display:flex;
    align-items:center;
    gap:12px;
    background:#1e1e1e;
    border:1px solid #333;
    border-radius:12px;
    padding:12px;
}

.skin img{
    width:64px;
    height:64px;
    image-rendering:pixelated;
    border-radius:4px;
}

.skin-name{
    flex:1;
    font-weight:bold;
    color:#6cb6ff;
}

button{
    background:#2563eb;
    border:none;
    color:white;
    padding:8px 10px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#3b82f6;
}

#toast{
    position:fixed;
    right:20px;
    bottom:20px;
    background:#22c55e;
    padding:10px 16px;
    border-radius:8px;
    opacity:0;
    transition:.2s;
}

#previewModal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    justify-content:center;
    align-items:center;
}

#previewBox{
    background:#1e1e1e;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

#previewTitle{
    font-size:20px;
    margin-bottom:10px;
}

#skinCanvas{
    width:300px;
    height:400px;
    display:block;
}

.modelButtons{
    margin-bottom:10px;
}

.modelButtons button{
    margin:0 4px;
}
</style>
</head>
<body>

<h1>Skin Browser</h1>

<p style="text-align:center">
Choose a skin, copy the command, or preview it in 3D.
</p>

<div id="skins">
Loading skins...
</div>

<div id="toast">Copied!</div>

<div id="previewModal">

    <div id="previewBox">

        <div id="previewTitle"></div>

        <div class="modelButtons">
            <button onclick="setModel('default')">
                Wide (Steve)
            </button>

            <button onclick="setModel('slim')">
                Slim (Alex)
            </button>
        </div>

        <canvas id="skinCanvas"></canvas>

        <br>

        <button onclick="closePreview()">
            Close
        </button>

    </div>

</div>

<script src="https://unpkg.com/skinview3d/bundles/skinview3d.bundle.js"></script>

<script>

const USER = "FloppyDisk-OSC";
const REPO = "skins";

let viewer = null;
let currentSkin = "";
let currentModel = "default";

function toast(message="Copied!"){

    const t = document.getElementById("toast");

    t.textContent = message;

    t.style.opacity = "1";

    setTimeout(() => {
        t.style.opacity = "0";
    }, 1500);
}

async function copyCommand(fileName, model){

    const command =
`/skin set web ${model} "https://floppydisk-osc.github.io/skins/${fileName}"`;

    await navigator.clipboard.writeText(command);

    toast(`${model} command copied`);
}

function closePreview(){

    document.getElementById("previewModal").style.display = "none";
}

async function previewSkin(fileName){

    currentSkin = fileName;

    document.getElementById("previewModal").style.display = "flex";

    document.getElementById("previewTitle").textContent =
        fileName.replace(/\.png$/i,"");

    await loadCurrentSkin();
}

async function setModel(model){

    currentModel = model;

    if(currentSkin){
        await loadCurrentSkin();
    }
}

async function loadCurrentSkin(){

    const url =
        `https://floppydisk-osc.github.io/skins/${currentSkin}`;

    if(!viewer){

        viewer = new skinview3d.SkinViewer({
            canvas: document.getElementById("skinCanvas"),
            width:300,
            height:400
        });

        viewer.controls.enableRotate = true;

        if(skinview3d.WalkingAnimation){
            viewer.animation =
                new skinview3d.WalkingAnimation();
        }
    }

    await viewer.loadSkin(url,{
        model: currentModel
    });
}

async function loadSkins(){

    try{

        const response = await fetch(
            `https://api.github.com/repos/${USER}/${REPO}/contents`
        );

        const files = await response.json();

        const skins = files
            .filter(file =>
                file.name.toLowerCase().endsWith(".png")
            )
            .sort((a,b)=>
                a.name.localeCompare(b.name)
            );

        const container =
            document.getElementById("skins");

        container.innerHTML = "";

        skins.forEach(file => {

            const name =
                file.name.replace(/\.png$/i,"");

            const card =
                document.createElement("div");

            card.className = "skin";

            card.innerHTML = `
                <img src="${file.download_url}">
                <span class="skin-name">${name}</span>

                <button class="wideBtn">
                    Copy Wide
                </button>

                <button class="slimBtn">
                    Copy Slim
                </button>

                <button class="previewBtn">
                    Preview
                </button>
            `;

            card.querySelector(".wideBtn")
                .onclick = () =>
                    copyCommand(file.name,"default");

            card.querySelector(".slimBtn")
                .onclick = () =>
                    copyCommand(file.name,"slim");

            card.querySelector(".previewBtn")
                .onclick = () =>
                    previewSkin(file.name);

            container.appendChild(card);
        });

    }catch(err){

        console.error(err);

        document.getElementById("skins").innerHTML =
            "Failed to load skins.";
    }
}

loadSkins();

</script>

</body>
</html>
