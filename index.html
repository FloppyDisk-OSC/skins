<!-- Fixed this bum-ass renderer hopefully -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skin Browser</title>

<style>
body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#121212;
    color:white;
}

h1{
    text-align:center;
}

#skins{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(350px,1fr));
    gap:12px;
}

.skin{
    display:flex;
    align-items:center;
    gap:12px;
    background:#1e1e1e;
    border:1px solid #333;
    border-radius:12px;
    padding:12px;
}

.skin img{
    width:64px;
    height:64px;
    image-rendering:pixelated;
    border-radius:4px;
}

.skin-name{
    flex:1;
    color:#6cb6ff;
    cursor:pointer;
    font-weight:bold;
}

.skin-name:hover{
    text-decoration:underline;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    border-radius:6px;
    padding:8px 12px;
    cursor:pointer;
}

button:hover{
    background:#3b82f6;
}

#toast{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#22c55e;
    padding:10px 16px;
    border-radius:8px;
    opacity:0;
    transition:opacity .2s;
}

#previewModal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.8);
    justify-content:center;
    align-items:center;
}

#previewBox{
    background:#1e1e1e;
    border-radius:12px;
    padding:20px;
    text-align:center;
}

#previewTitle{
    margin-bottom:10px;
    font-size:20px;
}

#skinCanvas{
    width:300px;
    height:400px;
    display:block;
}

.closeBtn{
    margin-top:10px;
}
</style>
</head>
<body>

<h1>Skin Browser</h1>

<p style="text-align:center">
Click a skin name to copy the command.
</p>

<div id="skins">
Loading skins...
</div>

<div id="toast">Copied!</div>

<div id="previewModal">
    <div id="previewBox">
        <div id="previewTitle"></div>

        <canvas id="skinCanvas"></canvas>

        <button class="closeBtn" onclick="closePreview()">
            Close
        </button>
    </div>
</div>

<script src="https://unpkg.com/skinview3d/bundles/skinview3d.bundle.js"></script>

<script>
const USER = "FloppyDisk-OSC";
const REPO = "skins";

let viewer = null;

function toast() {
    const t = document.getElementById("toast");
    t.style.opacity = "1";

    setTimeout(() => {
        t.style.opacity = "0";
    }, 1500);
}

async function copySkin(fileName) {

    const command =
`/skin set web slim "https://floppydisk-osc.github.io/skins/${fileName}"`;

    await navigator.clipboard.writeText(command);

    toast();
}

function closePreview() {
    document.getElementById("previewModal").style.display = "none";
}

async function previewSkin(fileName) {

    document.getElementById("previewModal").style.display = "flex";

    document.getElementById("previewTitle").textContent =
        fileName.replace(".png","");

    const url =
        `https://floppydisk-osc.github.io/skins/${fileName}`;

    if (!viewer) {

        viewer = new skinview3d.SkinViewer({
            canvas: document.getElementById("skinCanvas"),
            width: 300,
            height: 400
        });

        viewer.controls.enableRotate = true;

        if (skinview3d.WalkingAnimation) {
            viewer.animation =
                new skinview3d.WalkingAnimation();
        }
    }

    await viewer.loadSkin(url);
}

async function loadSkins() {

    try {

        const response = await fetch(
            `https://api.github.com/repos/${USER}/${REPO}/contents`
        );

        const files = await response.json();

        const skins = files
            .filter(file =>
                file.name.toLowerCase().endsWith(".png")
            )
            .sort((a,b) =>
                a.name.localeCompare(b.name)
            );

        const container =
            document.getElementById("skins");

        container.innerHTML = "";

        skins.forEach(file => {

            const card =
                document.createElement("div");

            card.className = "skin";

            const displayName =
                file.name.replace(/\.png$/i,"");

            card.innerHTML = `
                <img src="${file.download_url}">
                <span class="skin-name">${displayName}</span>
                <button>Preview</button>
            `;

            card.querySelector(".skin-name")
                .onclick = () =>
                    copySkin(file.name);

            card.querySelector("button")
                .onclick = () =>
                    previewSkin(file.name);

            container.appendChild(card);
        });

    } catch (err) {

        console.error(err);

        document.getElementById("skins").innerHTML =
            "Failed to load skins.";
    }
}

loadSkins();
</script>

</body>
</html>
